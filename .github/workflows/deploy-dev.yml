name: Deploy Dev

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: foji-worker-dev
  LAMBDA_FUNCTIONS: >-
    foji-worker-file-extraction-dev
    foji-worker-whatsapp-dev
    foji-worker-analytics-dev

jobs:
  deploy:
    name: Build & Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          # Also tag as latest for dev
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update Lambda functions
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        run: |
          for fn in $LAMBDA_FUNCTIONS; do
            echo "Updating $fn → $IMAGE_URI"
            aws lambda update-function-code \
              --function-name "$fn" \
              --image-uri "$IMAGE_URI" \
              --no-cli-pager
          done

      - name: Wait for Lambda updates to complete
        run: |
          for fn in $LAMBDA_FUNCTIONS; do
            echo "Waiting for $fn..."
            aws lambda wait function-updated \
              --function-name "$fn" \
              --no-cli-pager
          done

      - name: Notify success
        run: echo "✅ Dev deploy complete — image ${{ steps.build-image.outputs.image }}"
