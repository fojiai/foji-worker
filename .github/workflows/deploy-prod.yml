name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        default: ""

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: foji-worker-dev

jobs:
  guard:
    name: Confirm deployment
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "Deployment not confirmed. Type 'deploy' in the confirm field."
            exit 1
          fi

  deploy:
    name: Build & Deploy to Prod
    runs-on: ubuntu-latest
    needs: guard
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Create or update Lambda functions
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        run: |
          COMMON_ENV='{
            "Variables": {
              "AWS_SSM_PREFIX": "/foji/prod/worker/",
              "AWS_S3_BUCKET_NAME": "foji-files-prod",
              "AWS_DYNAMODB_TABLE": "foji-chats-prod"
            }
          }'

          declare -A FUNCTIONS
          FUNCTIONS[foji-worker-file-extraction-prod]="app.handlers.file_extraction.handler|512|300"
          FUNCTIONS[foji-worker-whatsapp-prod]="app.handlers.whatsapp.handler|256|30"
          FUNCTIONS[foji-worker-analytics-prod]="app.handlers.analytics.handler|256|300"

          for fn in "${!FUNCTIONS[@]}"; do
            IFS='|' read -r handler memory timeout <<< "${FUNCTIONS[$fn]}"

            EXISTS=$(aws lambda get-function --function-name "$fn" 2>/dev/null && echo "yes" || echo "no")

            if [ "$EXISTS" = "no" ]; then
              echo "Creating Lambda function $fn..."
              aws lambda create-function \
                --function-name "$fn" \
                --package-type Image \
                --code ImageUri="$IMAGE_URI" \
                --role "${{ secrets.LAMBDA_EXECUTION_ROLE_ARN }}" \
                --memory-size "$memory" \
                --timeout "$timeout" \
                --environment "$COMMON_ENV" \
                --image-config '{"Command": ["'"$handler"'"]}' \
                --no-cli-pager
            else
              echo "Updating Lambda function $fn..."
              aws lambda update-function-code \
                --function-name "$fn" \
                --image-uri "$IMAGE_URI" \
                --no-cli-pager

              aws lambda wait function-updated --function-name "$fn" --no-cli-pager

              aws lambda update-function-configuration \
                --function-name "$fn" \
                --memory-size "$memory" \
                --timeout "$timeout" \
                --environment "$COMMON_ENV" \
                --image-config '{"Command": ["'"$handler"'"]}' \
                --no-cli-pager
            fi
          done

      - name: Wait for Lambda updates
        run: |
          for fn in foji-worker-file-extraction-prod foji-worker-whatsapp-prod foji-worker-analytics-prod; do
            echo "Waiting for $fn..."
            aws lambda wait function-updated --function-name "$fn" --no-cli-pager
          done

      - name: Ensure SQS triggers exist
        run: |
          EXISTING=$(aws lambda list-event-source-mappings --function-name foji-worker-file-extraction-prod \
            --query "EventSourceMappings[?contains(EventSourceArn, 'foji-file-extraction-prod')]" --output text)
          if [ -z "$EXISTING" ]; then
            aws lambda create-event-source-mapping \
              --function-name foji-worker-file-extraction-prod \
              --event-source-arn "${{ secrets.PROD_SQS_FILE_EXTRACTION_ARN }}" \
              --batch-size 1 --no-cli-pager
          fi

          EXISTING=$(aws lambda list-event-source-mappings --function-name foji-worker-whatsapp-prod \
            --query "EventSourceMappings[?contains(EventSourceArn, 'foji-whatsapp-prod')]" --output text)
          if [ -z "$EXISTING" ]; then
            aws lambda create-event-source-mapping \
              --function-name foji-worker-whatsapp-prod \
              --event-source-arn "${{ secrets.PROD_SQS_WHATSAPP_ARN }}" \
              --batch-size 1 --no-cli-pager
          fi

      - name: Ensure EventBridge schedule exists
        run: |
          RULE_EXISTS=$(aws events describe-rule --name foji-analytics-prod 2>/dev/null && echo "yes" || echo "no")
          if [ "$RULE_EXISTS" = "no" ]; then
            aws events put-rule \
              --name foji-analytics-prod \
              --schedule-expression "cron(5 0 * * ? *)" \
              --state ENABLED

            FN_ARN=$(aws lambda get-function --function-name foji-worker-analytics-prod \
              --query "Configuration.FunctionArn" --output text)

            aws lambda add-permission \
              --function-name foji-worker-analytics-prod \
              --statement-id eventbridge-analytics \
              --action lambda:InvokeFunction \
              --principal events.amazonaws.com \
              --source-arn "arn:aws:events:${{ env.AWS_REGION }}:$(aws sts get-caller-identity --query Account --output text):rule/foji-analytics-prod" \
              2>/dev/null || true

            aws events put-targets \
              --rule foji-analytics-prod \
              --targets "Id=analytics,Arn=$FN_ARN"
          fi

      - name: Summary
        run: echo "Prod deploy complete — image ${{ steps.build-image.outputs.image }}"
